<div align="center">

    <p-table [value]="tiposDespesas"
             [style]="{'width': '600px','padding':'0'}"
             scrollHeight="600px"
             sortField="nome" [sortOrder]="1"
             dataKey="id" #dt
             editMode="row"
             [scrollable]="true" scrollHeight="600px"
             styleClass="p-datatable-striped p-datatable-sm">

      <ng-template pTemplate="caption">Tipos de Despesa</ng-template>

      <ng-template pTemplate="header">
        <tr>
          <th [pSortableColumn]="'id'">Id
            <p-sortIcon [field]="'id'"></p-sortIcon>
          </th>
          <th style="min-width: 450px;"
            [pSortableColumn]="'nome'">Nome
            <p-sortIcon [field]="'nome'"></p-sortIcon>
          </th>
          <th>Editar</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-tipo let-editing="editing" let-ri="rowIndex">
        <tr [pEditableRow]="tipo">
          <td>
            {{tipo.id}}
          </td>
          <td style="min-width: 450px;">
            <p-cellEditor>
              <ng-template pTemplate="input">
                <input pInputText type="text" [(ngModel)]="tipo.nome"  size="55">
              </ng-template>
              <ng-template pTemplate="output">
                {{tipo.nome}}
              </ng-template>
            </p-cellEditor>
          </td>
          <td style="text-align:center">
            <button *ngIf="!editing" pButton pRipple type="button" pInitEditableRow icon="pi pi-pencil"
                    class="p-button-rounded p-button-text">
            </button>
            <button *ngIf="editing" pButton pRipple type="button" pSaveEditableRow icon="pi pi-check"
                    (click)="onRowEditSave(tipo)"
                    class="p-button-rounded p-button-text p-button-success mr-2">
            </button>
            <button *ngIf="editing" pButton pRipple type="button" pCancelEditableRow icon="pi pi-times"
                    class="p-button-rounded p-button-text p-button-danger">
            </button>
          </td>
        </tr>
      </ng-template>

    </p-table>
</div>
